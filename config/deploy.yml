# Kamal 2 deploy config for mcp-analytics.
#
# Single host (Hetzner CX32), three containers:
#   - web        Rails app           : mcp-analytics.com
#   - ingest     Go service          : t.mcp-analytics.com (accessory, custom image)
#   - clickhouse ClickHouse server   : internal network only (accessory)
#
# kamal-proxy (auto-deployed by Kamal) terminates TLS via Let's Encrypt for
# both the Rails app AND the ingest accessory.
#
# Expected env/secrets (see .kamal/secrets):
#   KAMAL_REGISTRY_PASSWORD   GHCR Personal Access Token (from ~/.zshrc)
#   RAILS_MASTER_KEY          decrypts config/credentials.yml.enc
#   CLICKHOUSE_PASSWORD       pulled out of credentials by .kamal/secrets
#
# First-time deploy (must build the ingest accessory image first since
# Kamal does not build accessory images itself):
#   bin/build-ingest
#   kamal setup
#
# Subsequent deploys:
#   bin/build-ingest                 # only if ingestion/ changed
#   kamal accessory reboot ingest    # only if ingestion/ changed
#   kamal deploy                     # always; rebuilds & redeploys Rails

service: mcp-analytics
image: spreenovate/mcp-analytics-rails

servers:
  web:
    hosts:
      - 49.13.165.191
    labels:
      traefik.enable: "false"
    proxy:
      ssl: true
      # Both apex + www get TLS certs from Let's Encrypt (multi-SAN).
      # We 301 www to apex inside Rails for canonical URL hygiene; the
      # proxy just needs to terminate TLS on both so robots.txt and every
      # other URL is reachable at every variant (GSC, AI crawlers all
      # probe variants).
      hosts:
        - mcp-analytics.com
        - www.mcp-analytics.com
      app_port: 80
      healthcheck:
        path: /up
        interval: 10
        timeout: 2

# Shared env for the Rails (web) role.
env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    SOLID_QUEUE_IN_PUMA: "1"
    JOB_CONCURRENCY: "1"
    PUBLIC_BASE_URL: "https://mcp-analytics.com"
    PUBLIC_HOST: "mcp-analytics.com"
    TRACKER_BASE_URL: "https://t.mcp-analytics.com"
    ADDITIONAL_HOSTS: "www.mcp-analytics.com"
    CLICKHOUSE_URL: "http://mcp-analytics-clickhouse:8123"
    CLICKHOUSE_DB: "mcpa"
    MAIL_FROM: "agent@mcp-analytics.com"
    OPERATOR_EMAIL: "info@spreenovate.de"
  secret:
    - RAILS_MASTER_KEY
    - CLICKHOUSE_PASSWORD

# Shared storage volume — lives on the server filesystem, binds into both
# the Rails web container AND the ingest accessory below.
volumes:
  - "mcp_storage:/rails/storage"

registry:
  server: ghcr.io
  username: spreenovate
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: .
  dockerfile: Dockerfile

accessories:
  # Go ingest service. Different image than the Rails app, so it lives
  # as an accessory rather than a `servers:` role (Kamal 2 does not allow
  # per-role image overrides under `servers:`).
  ingest:
    image: ghcr.io/spreenovate/mcp-analytics-ingest:latest
    host: 49.13.165.191
    cmd: /app/ingest
    proxy:
      ssl: true
      host: t.mcp-analytics.com
      app_port: 8081
      healthcheck:
        path: /healthz
        interval: 10
        timeout: 2
    env:
      clear:
        INGEST_LISTEN: ":8081"
        DATABASE_PATH: "/rails/storage/production.sqlite3"
        CLICKHOUSE_URL: "http://mcp-analytics-clickhouse:8123"
        CLICKHOUSE_DB: "mcpa"
        STATIC_DIR: "/app/static"
      secret:
        - CLICKHOUSE_PASSWORD
    volumes:
      # Same shared storage volume as the Rails container — Go reads sites.db
      # and writes usage_counters / unknown_site_hits / abuse_events. SQLite
      # WAL mode makes the cross-process concurrency safe.
      - "mcp_storage:/rails/storage"

  # ClickHouse — single node, internal network only.
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    host: 49.13.165.191
    port: "127.0.0.1:8123:8123"
    options:
      ulimit: "nofile=262144:262144"
    env:
      clear:
        CLICKHOUSE_DB: "mcpa"
        CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      secret:
        - CLICKHOUSE_PASSWORD
    files:
      - clickhouse/init/01_events.sql:/docker-entrypoint-initdb.d/01_events.sql
      - clickhouse/init/02_events_hourly_mv.sql:/docker-entrypoint-initdb.d/02_events_hourly_mv.sql
      - clickhouse/init/03_referrers_daily_mv.sql:/docker-entrypoint-initdb.d/03_referrers_daily_mv.sql
    directories:
      # Keep ClickHouse data on the host SSD at /var/lib/clickhouse. Briefing
      # calls this out explicitly — later migration to a dedicated volume needs
      # no code change.
      - /var/lib/clickhouse:/var/lib/clickhouse

# Backup (daily) is handled by a host-level cron that `docker exec`s into the
# ClickHouse container and runs `clickhouse-client ... BACKUP TABLE mcpa.events`
# + snapshots the Rails SQLite files. See ops/backup.sh.
