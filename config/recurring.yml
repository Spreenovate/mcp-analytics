# Solid Queue recurring tasks.
# Only the production environment runs them; development works fine without.

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  rotate_default_salts:
    class: RotateDefaultSaltsJob
    queue: default
    schedule: every day at 03:17 UTC

  purge_expired_verifications:
    class: PurgeExpiredVerificationsJob
    queue: default
    schedule: every day at 04:00 UTC

  usage_limit_alert:
    class: UsageLimitAlertJob
    queue: default
    schedule: every day at 06:00 UTC

  abuse_alert:
    class: AbuseAlertJob
    queue: default
    schedule: every 5 minutes
